<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhD Opportunities Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-title">
        <h1>🎓 PhD Opportunities Tracker</h1>
        <p class="header-sub">Fully Funded · International Students Welcome · Auto-Updated Daily</p>
      </div>
      <div class="header-stats">
        <div class="stat-pill" id="total-count">— positions</div>
        <div class="stat-pill" id="last-updated">Loading…</div>
      </div>
    </div>
  </header>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <div class="filter-inner">
      <input type="text" id="search-input" placeholder="🔍  Search by title, university, keywords…" />

      <select id="filter-field">
        <option value="all">All Fields</option>
        <option value="Data Science">Data Science / AI</option>
        <option value="Environmental">Environmental / Climate</option>
        <option value="Economics">Economics</option>
        <option value="Sustainability">Sustainability</option>
      </select>

      <select id="filter-region">
        <option value="all">All Regions</option>
        <option value="Europe">Europe</option>
        <option value="North America">North America</option>
        <option value="Australia">Australia</option>
        <option value="Asia">Asia</option>
      </select>

      <select id="filter-deadline">
        <option value="all">Any Deadline</option>
        <option value="urgent">Closing Soon (&lt;14 days)</option>
        <option value="month">This Month</option>
        <option value="3months">Next 3 Months</option>
      </select>

      <select id="sort-by">
        <option value="deadline">Sort: Deadline</option>
        <option value="added">Sort: Recently Added</option>
        <option value="country">Sort: Country</option>
      </select>

      <label class="toggle-label">
        <input type="checkbox" id="hide-language" checked />
        Hide language requirements
      </label>
    </div>
  </div>

  <!-- RESULTS COUNT -->
  <div class="results-bar">
    <span id="results-count">Loading…</span>
  </div>

  <!-- CARDS GRID -->
  <main class="cards-grid" id="cards-grid">
    <div class="loading-spinner">Loading opportunities…</div>
  </main>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-box" id="modal-box">
      <button class="modal-close" id="modal-close">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p>Data sourced from public academic job boards. Updated daily.</p>
    <p class="footer-hint">To add opportunities: edit <code>data/opportunities.json</code> and push to GitHub.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
